<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="The Vault — AI tools and resources for agents and lenders.">
  <meta property="og:title" content="The Vault · CNAT AI Hub">

  <style>
    :root {
      color-scheme: dark;
      --bg: #08101b;
      --accent: #faed36;
      --accent-blue: #2d7dd2;
      --text: #eff5ff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Montserrat", "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    iframe {
      display: block;
      flex: 1 1 auto;
      width: 100%;
      min-height: 100vh;
      border: 0;
      background: var(--bg);
    }

    .setup-fab {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 9999;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--accent);
      color: #0a0e16;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      box-shadow: 0 10px 28px rgba(250, 237, 54, 0.22), 0 2px 8px rgba(0, 0, 0, 0.35);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .setup-fab:hover {
      transform: translateY(-1px);
      background: #fff36b;
      box-shadow: 0 14px 32px rgba(250, 237, 54, 0.32), 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    .setup-fab:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 3px;
    }

    .setup-fab svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 520px) {
      .setup-fab {
        top: 12px;
        right: 12px;
        padding: 9px 13px;
        font-size: 12px;
      }
      .setup-fab .setup-fab-label-long { display: none; }
    }

    .noscript { padding: 24px; }
    .noscript a { color: var(--accent); font-weight: 700; }
  </style>
</head>
<body>
  <a href="/setup" class="setup-fab" aria-label="Set up your AI tool">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M13 2 4 14h7l-1 8 9-12h-7l1-8z"></path>
    </svg>
    <span><span class="setup-fab-label-long">Set Up </span>Your AI Tool</span>
  </a>
  <iframe src="./the%20vault/The%20Vault.live-20260316.html" title="The Vault"></iframe>
  <noscript>
    <div class="noscript">
      Open <a href="./the%20vault/The%20Vault.live-20260316.html">the live-synced Vault source</a> directly if needed.
    </div>
  </noscript>
</body>
</html>
