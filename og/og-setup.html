<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG · AI Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: #0b1322;
    color: #fff;
    position: relative;
    width: 1200px;
    height: 630px;
    display: flex;
  }
  /* Decorative layers */
  .bg-glow {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 85% 15%, rgba(250,237,54,0.18), transparent 42%),
      radial-gradient(ellipse at 15% 85%, rgba(45,125,210,0.22), transparent 45%),
      linear-gradient(135deg, #0b1322 0%, #111f33 60%, #0b1322 100%);
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.9) 45%, transparent 75%);
  }

  .frame {
    position: relative;
    z-index: 2;
    display: flex;
    width: 100%;
    height: 630px;
    padding: 54px 60px;
    gap: 48px;
    align-items: stretch;
  }

  /* LEFT: text */
  .left {
    flex: 1.2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 22px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(45,125,210,0.14);
    border: 1px solid rgba(45,125,210,0.38);
    color: #4a9ae8;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    align-self: flex-start;
  }
  .badge .pulse {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4a9ae8;
    box-shadow: 0 0 0 5px rgba(74,154,232,0.2);
  }
  .brand {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
  }
  .brand-text {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #4a9ae8;
  }
  h1 {
    font-size: 72px;
    font-weight: 300;
    line-height: 1.02;
    letter-spacing: -2px;
    margin-top: 22px;
  }
  h1 .highlight {
    color: #faed36;
    font-weight: 800;
  }
  .subtitle {
    font-size: 19px;
    font-weight: 400;
    color: #9fb2c9;
    line-height: 1.45;
    margin-top: 18px;
    max-width: 500px;
  }
  .footer-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 10px;
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .domain {
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .domain .dim { color: #8892a4; font-weight: 500; }
  .domain .acc { color: #faed36; }
  .divider-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: #4a9ae8;
  }
  .tag {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #9fb2c9;
    font-weight: 700;
  }
  .tag .gold { color: #faed36; }

  /* RIGHT: tool-circle visual */
  .right {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ring {
    width: 380px; height: 380px;
    border-radius: 50%;
    border: 1px solid rgba(74,154,232,0.25);
    position: relative;
    box-shadow:
      0 0 0 20px rgba(45,125,210,0.05),
      0 0 80px rgba(45,125,210,0.18) inset;
  }
  .ring::before, .ring::after {
    content: "";
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    border: 1px dashed rgba(74,154,232,0.18);
  }
  .ring::after { inset: -60px; opacity: 0.4; }

  .center-core {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 128px; height: 128px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #faed36, #c9b615 70%);
    display: flex; align-items: center; justify-content: center;
    box-shadow:
      0 0 60px rgba(250,237,54,0.45),
      0 0 0 8px rgba(250,237,54,0.10);
  }
  .center-core-text {
    font-size: 34px;
    font-weight: 900;
    color: #0b1322;
    letter-spacing: -1px;
  }

  .tool {
    position: absolute;
    width: 82px; height: 82px;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    box-shadow: 0 14px 40px rgba(0,0,0,0.4);
    background: linear-gradient(135deg, var(--c1), var(--c2));
  }
  .tool svg { width: 44px; height: 44px; fill: currentColor; }
  .t-top { top: 0; left: 50%; transform: translate(-50%, -50%); --c1: #10a37f; --c2: #0d8c6d; }
  .t-right { top: 50%; right: 0; transform: translate(50%, -50%); --c1: #d97706; --c2: #b45309; }
  .t-bottom { bottom: 0; left: 50%; transform: translate(-50%, 50%); --c1: #4285f4; --c2: #7b3fe4; }
  .t-left { top: 50%; left: 0; transform: translate(-50%, -50%); --c1: #20b2aa; --c2: #1a8f89; }

  .connector {
    position: absolute;
    top: 50%; left: 50%;
    width: 155px; height: 2px;
    background: linear-gradient(90deg, rgba(74,154,232,0.4), transparent);
    transform-origin: left center;
  }
  .c-1 { transform: translate(0, -1px) rotate(0deg); }
  .c-2 { transform: translate(0, -1px) rotate(90deg); }
  .c-3 { transform: translate(0, -1px) rotate(180deg); }
  .c-4 { transform: translate(0, -1px) rotate(270deg); }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="grid"></div>

<div class="frame">
  <div class="left">
    <div class="badge"><span class="pulse"></span><span>AI Setup Playbook</span></div>
    <h1>Set Up Your<br><span class="highlight">AI Tool</span></h1>
    <p class="subtitle">Turn ChatGPT, Claude, Gemini, or Perplexity into a real assistant &mdash; beginner through advanced, built for real estate.</p>
    <div class="footer-row">
      <div class="domain"><span class="acc">ai.</span>cnattitle<span class="dim">.com</span></div>
      <span class="divider-dot"></span>
      <div class="tag">#AlwaysBeClosing <span class="gold">&middot; TX</span></div>
    </div>
  </div>

  <div class="right">
    <div class="ring">
      <span class="connector c-1"></span>
      <span class="connector c-2"></span>
      <span class="connector c-3"></span>
      <span class="connector c-4"></span>

      <div class="center-core"><span class="center-core-text">AI</span></div>

      <div class="tool t-top" title="ChatGPT">
        <svg viewBox="0 0 24 24"><path d="M22.28 9.71a5.77 5.77 0 0 0-.51-4.75 5.87 5.87 0 0 0-6.33-2.81 5.79 5.79 0 0 0-4.37-1.94 5.87 5.87 0 0 0-5.6 4.06A5.79 5.79 0 0 0 1.6 6.96a5.87 5.87 0 0 0 .72 6.89 5.77 5.77 0 0 0 .5 4.75 5.87 5.87 0 0 0 6.33 2.81 5.77 5.77 0 0 0 4.37 1.94 5.87 5.87 0 0 0 5.6-4.07 5.79 5.79 0 0 0 3.87-2.81 5.87 5.87 0 0 0-.71-6.76zM9.18 10.4l2.55-1.47 2.55 1.47v2.94l-2.55 1.47-2.55-1.47V10.4z"/></svg>
      </div>
      <div class="tool t-right" title="Claude">
        <svg viewBox="0 0 24 24"><path d="M12 2.5c.3 0 .55.2.62.5l1.23 4.98a3 3 0 0 0 2.17 2.17l4.98 1.23c.3.07.5.33.5.62s-.2.55-.5.62l-4.98 1.23a3 3 0 0 0-2.17 2.17l-1.23 4.98a.63.63 0 0 1-1.22 0l-1.23-4.98a3 3 0 0 0-2.17-2.17l-4.98-1.23a.63.63 0 0 1 0-1.22l4.98-1.23a3 3 0 0 0 2.17-2.17l1.22-4.98A.63.63 0 0 1 12 2.5z"/></svg>
      </div>
      <div class="tool t-bottom" title="Gemini">
        <svg viewBox="0 0 24 24"><path d="M12 2c.2 2.9 1.3 5.5 3 7.3S19.1 11.8 22 12c-2.9.2-5.5 1.3-7 3s-2.8 4.1-3 7c-.2-2.9-1.3-5.5-3-7s-4.1-2.8-7-3c2.9-.2 5.5-1.3 7-3s2.8-4.1 3-7z"/></svg>
      </div>
      <div class="tool t-left" title="Perplexity">
        <svg viewBox="0 0 24 24"><path d="M12 2 3 7v10l9 5 9-5V7l-9-5zm0 2.3 7 3.9v7.6l-7 3.9-7-3.9V8.2l7-3.9zm0 3.2-4.5 2.5v5l4.5 2.5 4.5-2.5v-5L12 7.5z"/></svg>
      </div>
    </div>
  </div>
</div>
</body>
</html>
