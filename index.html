<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=./ai-hub-landing.html">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CNAT AI Hub</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #09111d;
      --panel: #122033;
      --text: #f5f7fb;
      --muted: #9fb2c9;
      --accent: #faed36;
      --line: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(250, 237, 54, 0.12), transparent 32%),
        linear-gradient(180deg, #0f1c2f 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Montserrat", "Segoe UI", sans-serif;
    }

    .card {
      width: min(560px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(18, 32, 51, 0.9);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>CNAT AI Hub</h1>
    <p>Redirecting to the current AI Hub landing page.</p>
    <p>If the redirect does not start, open <a href="./ai-hub-landing.html">AI Hub</a>.</p>
  </main>
</body>
</html>
