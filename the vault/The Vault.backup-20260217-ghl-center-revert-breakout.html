<!-- GHL Custom HTML ready: paste this entire file into the Custom HTML element -->
<style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap');
    @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');

    :root {
      /* Palette based on 'Keeping AI on Things' aesthetic + Premium Dark Mode */
      --bg-deep: #0d1a2b;
      --bg-card: #0f1c2e;
      --bg-card-hover: #16263d;
      --accent-cyan: #00e5ff;
      --accent-cyan-dim: rgba(0, 229, 255, 0.15);
      --accent-purple: #9d4edd;
      --accent-gold: #d4a04a;
      --text-main: #ffffff;
      --text-muted: #94a3b8;
      --border-subtle: rgba(255, 255, 255, 0.08);
      --glow: 0 0 20px rgba(0, 229, 255, 0.15);
      --hero-ink: #11253c;
      --hero-muted: #576d86;
      --hero-border: rgba(36, 54, 78, 0.2);
      --hero-height: 430px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      overflow-x: hidden;
    }

    body.vault-card-focus-open {
      overflow: hidden;
    }

    #vault-embed-root {
      position: relative;
      display: block;
      width: 100%;
      max-width: 100%;
      margin: 0;
      left: auto;
      right: auto;
      flex: 0 0 100%;
      background-color: var(--bg-deep);
      background-image:
        linear-gradient(180deg, rgba(150, 177, 206, 0.2) 0%, rgba(112, 139, 167, 0.26) 18%, rgba(66, 92, 120, 0.4) 40%, rgba(28, 47, 67, 0.7) 62%, rgba(13, 26, 43, 0.92) 80%, rgba(13, 26, 43, 1) 100%),
        radial-gradient(circle at 16% 18%, rgba(0, 229, 255, 0.16) 0%, transparent 38%),
        radial-gradient(circle at 82% 10%, rgba(157, 78, 221, 0.11) 0%, transparent 36%),
        radial-gradient(circle at 52% 88%, rgba(212, 160, 74, 0.09) 0%, transparent 44%);
      background-size: 140% 140%, 130% 130%, 160% 160%;
      background-position: 0% 0%, 100% 0%, 40% 100%;
      animation: ambientShift 26s ease-in-out infinite alternate;
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      padding-top: var(--hero-height);
      isolation: isolate;
    }

    #vault-embed-root.card-focus-open {
      overflow: hidden;
    }

    button:focus-visible,
    a:focus-visible,
    input:focus-visible,
    .tool-card:focus-visible,
    .mini-tool-card:focus-visible {
      outline: 2px solid var(--accent-cyan);
      outline-offset: 2px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-deep);
    }

    ::-webkit-scrollbar-thumb {
      background: #2a3b55;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-cyan);
    }

    /* ── Header / Hero ── */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--hero-height);
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      background: transparent;
      border-bottom: 0;
      box-shadow: none;
      z-index: 5;
      transform-origin: top center;
      will-change: transform, opacity, clip-path, filter;
    }

    /* Overlay for readability */
    header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: none;
      z-index: 1;
      pointer-events: none;
    }

    .header-content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 800px;
      animation: fadeInDown 0.8s ease-out;
      transform-origin: top center;
      will-change: transform, opacity;
    }

    .brand-eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 0.85rem;
      color: #28435e;
      margin-bottom: 12px;
      display: inline-block;
      background: rgba(255, 255, 255, 0.82);
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid rgba(36, 54, 78, 0.22);
      backdrop-filter: blur(5px);
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 5rem;
      line-height: 0.9;
      margin-bottom: 24px;
      color: #f2f7ff;
      letter-spacing: 0.012em;
      text-shadow: 0 10px 24px rgba(4, 10, 18, 0.34);
    }

    .search-container {
      position: relative;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }

    #search-input {
      width: 100%;
      padding: 18px 24px 18px 55px;
      font-size: 1.1rem;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--hero-border);
      border-radius: 12px;
      color: var(--hero-ink);
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 24px rgba(23, 47, 75, 0.12);
    }

    #search-input:focus {
      outline: none;
      border-color: rgba(47, 95, 149, 0.58);
      box-shadow: 0 0 0 4px rgba(47, 95, 149, 0.14), 0 10px 28px rgba(17, 48, 79, 0.18);
      background: rgba(255, 255, 255, 0.95);
    }

    #search-input::placeholder {
      color: rgba(87, 109, 134, 0.9);
    }

    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--hero-muted);
      font-size: 1.2rem;
      pointer-events: none;
    }

    .library-layer {
      position: relative;
      z-index: 100;
      min-height: calc(100vh - var(--hero-height));
      background: transparent;
    }

    /* ── Filters ── */
    .filters-container {
      position: sticky;
      top: 0;
      z-index: 120;
      width: min(1480px, calc(100% - 20px));
      margin: 0 auto;
      border-radius: 18px;
      background: rgba(18, 33, 52, 0.78);
      backdrop-filter: blur(14px) saturate(130%);
      padding: 14px 76px;
      padding-left: max(76px, env(safe-area-inset-left));
      padding-right: max(76px, env(safe-area-inset-right));
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 14px 32px rgba(9, 20, 34, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: center;
      gap: 12px;
      overflow-x: auto;
      white-space: nowrap;
      scroll-padding-inline: 20px;
    }

    /* Hide scrollbar on filters for clean look */
    .filters-container::-webkit-scrollbar {
      height: 0px;
      background: transparent;
    }

    .filter-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .filter-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }

    .filter-btn.active {
      background: var(--accent-cyan-dim);
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
    }

    .filter-btn-under10 {
      color: #ff7b8f;
      border-color: rgba(255, 59, 92, 0.46);
      background: rgba(255, 59, 92, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 59, 92, 0.12), 0 0 14px rgba(255, 59, 92, 0.16);
    }

    .filter-btn-under10:hover {
      color: #ff9cad;
      border-color: rgba(255, 59, 92, 0.7);
      background: rgba(255, 59, 92, 0.16);
      box-shadow: 0 0 18px rgba(255, 59, 92, 0.28);
    }

    .filter-btn-under10.active {
      color: #ffd9e1;
      border-color: #ff3b5c;
      background: rgba(255, 59, 92, 0.28);
      box-shadow: 0 0 22px rgba(255, 59, 92, 0.48), inset 0 0 20px rgba(255, 59, 92, 0.2);
    }

    /* ── Main Layout ── */
    main {
      max-width: 1480px;
      margin: 0 auto;
      padding: 34px 20px 40px;
      position: relative;
      z-index: 100;
    }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-main);
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border-subtle), transparent);
    }

    /* ── Grid ── */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 320px));
      justify-content: center;
      gap: 22px;
      margin-bottom: 60px;
    }

    /* ── Card Design ── */
    .tool-card {
      --tool-accent: var(--accent-cyan);
      --tool-accent-rgb: 0, 229, 255;
      --spot-y: 50%;
      --spot-strength: 0;
      --spot-shift: 0px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      min-height: 342px;
      transition: transform 0.32s cubic-bezier(0.22, 0.61, 0.36, 1), border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      perspective: 1500px;
      transform: translateZ(0);
      will-change: transform;
    }

    .tool-card>* {
      position: relative;
      z-index: 1;
    }

    .tool-card-inner {
      position: relative;
      width: 100%;
      min-height: 342px;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.62s cubic-bezier(0.22, 0.61, 0.36, 1);
      z-index: 1;
      will-change: transform;
    }

    .tool-card.is-flipped .tool-card-inner {
      transform: rotateY(180deg);
    }

    .tool-card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      padding: 20px;
      display: flex;
      flex-direction: column;
      border-radius: 16px;
    }

    .tool-card-front {
      pointer-events: auto;
    }

    .tool-card-back {
      transform: rotateY(180deg);
      pointer-events: none;
      overflow-y: auto;
      background: linear-gradient(170deg, rgba(var(--tool-accent-rgb), 0.2) 0%, rgba(var(--tool-accent-rgb), 0.08) 28%, rgba(10, 21, 35, 0.92) 72%, rgba(10, 21, 35, 0.95) 100%);
      border: 1px solid rgba(var(--tool-accent-rgb), 0.32);
    }

    .tool-card.is-flipped .tool-card-back {
      pointer-events: auto;
    }

    .tool-card.is-flipped .tool-card-front {
      pointer-events: none;
    }

    .tool-card:hover,
    .tool-card.is-selected {
      transform: translateY(-5px);
      border-color: rgba(var(--tool-accent-rgb), 0.62);
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.42), 0 0 0 1px rgba(var(--tool-accent-rgb), 0.18), 0 0 26px rgba(var(--tool-accent-rgb), 0.2);
      background:
        linear-gradient(160deg, rgba(var(--tool-accent-rgb), 0.16) 0%, rgba(var(--tool-accent-rgb), 0.05) 42%, var(--bg-card-hover) 100%);
    }

    .tool-card.is-flipped {
      transform: translateY(-3px);
      border-color: rgba(var(--tool-accent-rgb), 0.68);
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.42), 0 0 0 1px rgba(var(--tool-accent-rgb), 0.22), 0 0 32px rgba(var(--tool-accent-rgb), 0.24);
    }

    .tool-card-placeholder {
      border-radius: 16px;
      pointer-events: none;
    }

    .tool-card.is-focused-prep {
      position: fixed !important;
      margin: 0 !important;
      z-index: 1300;
      transition: top 0.52s cubic-bezier(0.25, 0.9, 0.3, 1), left 0.52s cubic-bezier(0.25, 0.9, 0.3, 1), width 0.52s cubic-bezier(0.25, 0.9, 0.3, 1), height 0.52s cubic-bezier(0.25, 0.9, 0.3, 1), transform 0.52s cubic-bezier(0.25, 0.9, 0.3, 1), box-shadow 0.34s ease, border-color 0.34s ease;
    }

    .tool-card.is-focused {
      top: 50% !important;
      left: 50% !important;
      width: min(880px, calc(100vw - 48px)) !important;
      height: min(76vh, 680px) !important;
      transform: translate(-50%, -50%) !important;
      border-color: rgba(var(--tool-accent-rgb), 0.7);
      box-shadow: 0 24px 72px rgba(0, 0, 0, 0.58), 0 0 0 1px rgba(var(--tool-accent-rgb), 0.24), 0 0 38px rgba(var(--tool-accent-rgb), 0.26);
    }

    .tool-card.is-focused:hover {
      transform: translate(-50%, -50%) !important;
    }

    .tool-card.is-focused .tool-card-inner {
      min-height: 100%;
      height: 100%;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .tool-icon {
      width: 52px;
      height: 52px;
      background: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #1a2a45;
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      position: relative;
      padding: 6px;
    }

    .tool-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    /* .tool-icon i style removed */

    .pricing-badge {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pricing-free {
      background: rgba(76, 175, 80, 0.15);
      color: #66bb6a;
      border: 1px solid rgba(76, 175, 80, 0.3);
    }

    .pricing-paid {
      background: rgba(255, 82, 82, 0.15);
      color: #ff5252;
      border: 1px solid rgba(255, 82, 82, 0.3);
    }

    .pricing-freemium {
      background: rgba(255, 179, 0, 0.15);
      color: #ffb300;
      border: 1px solid rgba(255, 179, 0, 0.3);
    }

    .tool-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.28rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: white;
    }

    .tool-category {
      font-size: 0.82rem;
      color: rgba(var(--tool-accent-rgb), 0.96);
      margin-bottom: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .top-ai-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: -2px 0 10px;
      color: #9eeeff;
      border: 1px solid rgba(0, 229, 255, 0.36);
      background: rgba(0, 229, 255, 0.12);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.74rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      width: fit-content;
    }

    .tool-desc {
      font-size: 0.9rem;
      line-height: 1.45;
      color: var(--text-muted);
      margin-bottom: 16px;
      flex-grow: 1;
      /* Pushes footer down */
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      margin-top: auto;
    }

    .view-btn {
      background: transparent;
      color: white;
      border: 1px solid rgba(var(--tool-accent-rgb), 0.26);
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 0.86rem;
      transition: all 0.22s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .view-btn,
    .back-btn {
      cursor: pointer;
    }

    .tool-card:hover .view-btn,
    .tool-card.is-selected .view-btn {
      background: rgba(var(--tool-accent-rgb), 0.16);
      color: white;
      border-color: rgba(var(--tool-accent-rgb), 0.7);
    }

    .tool-back-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .tool-back-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: #fff;
    }

    .tool-back-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(var(--tool-accent-rgb), 0.95);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .tool-back-entry-price {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      color: #ffd8dd;
      background: rgba(255, 59, 92, 0.14);
      border: 1px solid rgba(255, 59, 92, 0.35);
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 0.82rem;
      line-height: 1.2;
    }

    .tool-back-entry-price i {
      color: #ff6f86;
      font-size: 0.8rem;
    }

    .tool-back-desc {
      color: #d4dde8;
      font-size: 0.95rem;
      line-height: 1.55;
      margin-bottom: 14px;
    }

    .tool-back-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .tool-back-panel {
      background: rgba(6, 15, 26, 0.5);
      border: 1px solid rgba(var(--tool-accent-rgb), 0.22);
      border-radius: 10px;
      padding: 10px 11px;
    }

    .tool-back-panel h4 {
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(var(--tool-accent-rgb), 0.95);
      margin-bottom: 7px;
    }

    .tool-back-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 6px;
      color: #d6dfeb;
      font-size: 0.86rem;
      line-height: 1.38;
    }

    .tool-back-list li {
      display: flex;
      gap: 7px;
      align-items: flex-start;
    }

    .tool-back-list i {
      color: rgba(var(--tool-accent-rgb), 0.9);
      font-size: 0.72rem;
      margin-top: 0.25em;
      flex-shrink: 0;
    }

    .tool-back-note {
      color: #b8c6d8;
      font-size: 0.82rem;
      margin: 2px 0 12px;
      line-height: 1.4;
    }

    .tool-back-actions {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .tool-card.is-focused .tool-card-face {
      padding: 26px;
    }

    .tool-card.is-focused .tool-back-title {
      font-size: 1.55rem;
    }

    .tool-card.is-focused .tool-back-meta {
      font-size: 0.92rem;
    }

    .tool-card.is-focused .tool-back-entry-price {
      font-size: 0.95rem;
      padding: 9px 12px;
    }

    .tool-card.is-focused .tool-back-desc {
      font-size: 1.08rem;
      line-height: 1.62;
      margin-bottom: 16px;
    }

    .tool-card.is-focused .tool-back-grid {
      gap: 12px;
      margin-bottom: 16px;
    }

    @media (min-width: 980px) {
      .tool-card.is-focused .tool-back-grid {
        grid-template-columns: minmax(0, 1.2fr) minmax(0, 0.8fr);
        align-items: stretch;
      }

      .tool-card.is-focused .tool-back-panel:nth-child(1) {
        grid-row: span 2;
        display: flex;
        flex-direction: column;
      }

      .tool-card.is-focused .tool-back-panel:nth-child(1) .tool-back-list {
        font-size: 1.04rem;
        line-height: 1.55;
        gap: 10px;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
      }
    }

    .tool-card.is-focused .tool-back-panel {
      padding: 12px 13px;
    }

    .tool-card.is-focused .tool-back-panel h4 {
      font-size: 0.84rem;
    }

    .tool-card.is-focused .tool-back-list {
      font-size: 0.95rem;
      line-height: 1.48;
    }

    .tool-card.is-focused .tool-back-note {
      font-size: 0.94rem;
      line-height: 1.5;
      margin: 2px 0 14px;
    }

    .tool-card.is-focused .tool-launch {
      font-size: 0.92rem;
      padding: 10px 14px;
    }

    .tool-card.is-focused .back-btn {
      font-size: 0.9rem;
      padding: 10px 13px;
    }

    .tool-card-back::-webkit-scrollbar {
      width: 8px;
    }

    .tool-card-back::-webkit-scrollbar-thumb {
      background: rgba(var(--tool-accent-rgb), 0.42);
      border-radius: 6px;
    }

    .card-focus-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4, 9, 17, 0.64);
      backdrop-filter: blur(8px) saturate(118%);
      z-index: 1250;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.36s ease;
    }

    .card-focus-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .tool-launch {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(var(--tool-accent-rgb), 0.9);
      color: #07121f;
      font-weight: 700;

      filter: blur(2px);
      transition: opacity 0.22s ease, transform 0.22s linear;
      z-index: 0;

      opacity: calc(0.22 + (var(--spot-strength) * 0.72));

    function hexToRgb(hex) {
      const normalized = (hex || '').trim();
      if (!/^#([A-Fa-f0-9]{3}|[A-Fa-f0-9]{6})$/.test(normalized)) return '0, 229, 255';

      let value = normalized.slice(1);
      if (value.length === 3) value = value.split('').map(ch => ch + ch).join('');

      const intVal = parseInt(value, 16);
      const r = (intVal >> 16) & 255;
      const g = (intVal >> 8) & 255;
      const b = intVal & 255;
      return `${r}, ${g}, ${b}`;
    }

    function orderToolsForDisplay(filteredTools) {
      if (!isAllViewDefaultState()) return filteredTools;

      const featured = TOP_AI_ASSISTANT_ORDER

      const rest = filteredTools

    function flipCard(card) {
      if (flippedCardEl && flippedCardEl !== card) {
        flippedCardEl.classList.remove('is-flipped');
      }

      card.classList.add('is-flipped');
      flippedCardEl = card;
      scheduleTileBacklight();
    }

    function openFocusedCard(card) {
      if (!card) return;

      if (focusedCardEl && focusedCardEl !== card) {
        closeFocusedCard(false);
      }

      if (focusedCardEl === card) return;

      const rect = card.getBoundingClientRect();
      const placeholder = document.createElement('div');
      placeholder.className = 'tool-card-placeholder';
      placeholder.style.width = `${rect.width}px`;
      placeholder.style.height = `${rect.height}px`;

      const parent = card.parentNode;
      if (!parent) return;

      parent.insertBefore(placeholder, card);
      if (vaultRoot) {
        vaultRoot.appendChild(card);
      } else {
        document.body.appendChild(card);
      }

      card.classList.add('is-focused-prep');
      card.style.top = `${rect.top}px`;
      card.style.left = `${rect.left}px`;
      card.style.width = `${rect.width}px`;
      card.style.height = `${rect.height}px`;
      card.style.transform = 'translate(0, 0)';

      focusedCardEl = card;
      focusedPlaceholderEl = placeholder;

      if (vaultRoot) vaultRoot.classList.add('card-focus-open');
      document.body.classList.add('vault-card-focus-open');
      if (focusOverlay) focusOverlay.classList.add('open');

      window.requestAnimationFrame(() => {
        if (!focusedCardEl) return;
        card.classList.add('is-focused');

        window.setTimeout(() => {
          if (!focusedCardEl) return;
          flipCard(card);
        }, FOCUS_CARD_FLIP_DELAY_MS);
      });
    }

    function closeFocusedCard(animateBack = true) {
      if (!focusedCardEl) return;

      const card = focusedCardEl;
      const placeholder = focusedPlaceholderEl;

      const finalizeClose = () => {
        card.classList.remove('is-focused', 'is-focused-prep', 'is-flipped');
        if (flippedCardEl === card) flippedCardEl = null;

        card.style.removeProperty('top');
        card.style.removeProperty('left');
        card.style.removeProperty('width');
        card.style.removeProperty('height');
        card.style.removeProperty('transform');

        if (placeholder && placeholder.parentNode) {
          placeholder.parentNode.insertBefore(card, placeholder);
          placeholder.remove();
        }

        focusedCardEl = null;
        focusedPlaceholderEl = null;

        if (vaultRoot) vaultRoot.classList.remove('card-focus-open');
        document.body.classList.remove('vault-card-focus-open');
        if (focusOverlay) focusOverlay.classList.remove('open');

        scheduleTileBacklight();
      };

      if (!animateBack || !placeholder || !placeholder.parentNode) {
        finalizeClose();
        return;
      }

      const targetRect = placeholder.getBoundingClientRect();
      card.classList.remove('is-flipped');
      if (flippedCardEl === card) flippedCardEl = null;

      window.requestAnimationFrame(() => {
        card.classList.remove('is-focused');
        card.style.top = `${targetRect.top}px`;
        card.style.left = `${targetRect.left}px`;
        card.style.width = `${targetRect.width}px`;
        card.style.height = `${targetRect.height}px`;
        card.style.transform = 'translate(0, 0)';
      });

      window.setTimeout(finalizeClose, FOCUS_CARD_CLOSE_MS);
    }

    function getHeroHeightPx() {
      const headerHeight = heroHeader ? heroHeader.offsetHeight : 0;
      if (Number.isFinite(headerHeight) && headerHeight > 0) {
        return headerHeight;
      }

      const raw = getComputedStyle(document.documentElement).getPropertyValue('--hero-height').trim();
      const value = parseFloat(raw);
      return Number.isFinite(value) && value > 0 ? value : 430;
    }

    function getTargetHeroProgress(heroHeight) {
      const safeHeight = Math.max(heroHeight, 1);
      const filtersVisible = filtersContainer && filtersContainer.offsetParent !== null;

      if (!filtersVisible) {
        return Math.max(0, Math.min(1, window.scrollY / safeHeight));
      }

      const startTop = heroHeight;
      const filterTop = filtersContainer.getBoundingClientRect().top;
      const traveled = startTop - filterTop;
      return Math.max(0, Math.min(1, traveled / safeHeight));
    }

    function onScrollEffects() {
      scheduleTileBacklight();
      scheduleHeroParallax();
    }

    function scheduleHeroParallax() {
      if (reduceMotion || heroFrame !== null) return;

      heroFrame = window.requestAnimationFrame(() => {
        heroFrame = null;
        updateHeroParallax();
      });
    }

    function updateHeroParallax() {
      if (!heroHeader || !heroContent) return;

      const heroHeight = getHeroHeightPx();
      const targetProgress = getTargetHeroProgress(heroHeight);
      heroProgressSmoothed += (targetProgress - heroProgressSmoothed) * 0.14;
      const progress = heroProgressSmoothed;
      const contentCutoff = 0.8;
      const contentFadeProgress = Math.max(0, Math.min(1, progress / contentCutoff));

      const headerShift = -26 * progress;
      const headerScale = 1 - (0.055 * progress);
      const headerFade = 1 - (0.2 * progress);
      const headerClip = 44 * progress;

      const contentShift = -42 * progress;
      const contentScale = 1 - (0.16 * progress);
      const contentFade = 1 - contentFadeProgress;

      heroHeader.style.transform = `translate3d(0, ${headerShift.toFixed(2)}px, 0) scale(${headerScale.toFixed(3)})`;
      heroHeader.style.opacity = headerFade.toFixed(3);
      heroHeader.style.clipPath = `inset(0 0 ${headerClip.toFixed(2)}% 0)`;
      heroHeader.style.filter = `saturate(${(1 - (0.12 * progress)).toFixed(3)})`;

      heroContent.style.transform = `translate3d(0, ${contentShift.toFixed(2)}px, 0) scale(${contentScale.toFixed(3)})`;
      heroContent.style.opacity = contentFade.toFixed(3);
      heroContent.style.visibility = contentFade <= 0.001 ? 'hidden' : 'visible';

      if (Math.abs(targetProgress - heroProgressSmoothed) > 0.001) {
        scheduleHeroParallax();
      }
    }

    function setupParallaxBacklight() {
      if (reduceMotion || typeof IntersectionObserver !== 'function') return;

      tileObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          const tile = entry.target;
          if (entry.isIntersecting) {
            tile.classList.add('in-view');
            inViewTiles.add(tile);
          } else {
            tile.classList.remove('in-view');
            inViewTiles.delete(tile);
            tile.style.setProperty('--spot-strength', '0');
            tile.style.setProperty('--spot-shift', '0px');
          }
        });

        scheduleTileBacklight();
      }, {
        threshold: [0.12, 0.25, 0.45],
        rootMargin: '0px 0px -10% 0px'
      });
    }

    function observeVisibleTiles(scopeEl) {
      if (!tileObserver || !scopeEl) return;

      scopeEl.querySelectorAll('.tool-card, .mini-tool-card').forEach((tile) => {
        tileObserver.observe(tile);
      });
    }

    function scheduleTileBacklight() {
      if (reduceMotion || tileFrame !== null) return;

      tileFrame = window.requestAnimationFrame(() => {
        tileFrame = null;
        updateTileBacklight();
      });
    }

    function updateTileBacklight() {
      const vh = Math.max(window.innerHeight || 0, 1);

      inViewTiles.forEach((tile) => {
        const rect = tile.getBoundingClientRect();
        if (rect.bottom <= 0 || rect.top >= vh) return;

        const centerY = rect.top + (rect.height / 2);
        const ratio = Math.max(0, Math.min(1, centerY / vh));
        const distanceFromCenter = Math.abs((centerY - (vh / 2)) / (vh / 2));
        const strength = Math.max(0, 1 - distanceFromCenter);
        const spotY = 8 + (ratio * 84);
        const shiftPx = (ratio - 0.5) * 30;

        tile.style.setProperty('--spot-y', `${spotY.toFixed(2)}%`);
        tile.style.setProperty('--spot-strength', strength.toFixed(3));
        tile.style.setProperty('--spot-shift', `${shiftPx.toFixed(2)}px`);
      });
    }

    function renderTools() {
      if (!grid) return;

      if (focusedCardEl) {
        closeFocusedCard(false);
      }

      if (tileObserver) {
        tileObserver.disconnect();
        inViewTiles.clear();
      }

      flippedCardEl = null;

      grid.innerHTML = '';

      const filtered = tools.filter(tool => {
        const toolName = String(tool.name || '').toLowerCase();
        const toolDescription = String(tool.description || '').toLowerCase();
        const toolTags = Array.isArray(tool.tags)
          ? tool.tags.map(tag => String(tag || '').toLowerCase())
          : [];
        const matchesSearch = toolName.includes(searchQuery) ||
          toolDescription.includes(searchQuery) ||
          toolTags.some(tag => tag.includes(searchQuery));
        const matchesCategory = activeCategory === 'all' ||
          (activeCategory === 'under-10' ? isToolUnderTen(tool) : tool.category === activeCategory);

        return matchesSearch && matchesCategory;
      });
      const isAllDefault = isAllViewDefaultState();
      const displayedTools = orderToolsForDisplay(filtered);

      const countDisplayEl = getCountDisplayEl();
      if (countDisplayEl) {
        countDisplayEl.innerText = `(${filtered.length} items)`;
      }

      if (filtered.length === 0) {
        grid.innerHTML = NO_RESULTS_HTML;
        return;
      }

      displayedTools.forEach(tool => {
        const card = document.createElement('div');
        card.className = 'tool-card';
        card.tabIndex = 0;
        card.setAttribute('role', 'button');
        card.setAttribute('aria-label', `Open details for ${tool.name}`);
        const accent = getToolAccent(tool);
        applyToolAccent(card, accent);

        const priceClass = getPricingClass(tool.pricing);

        const logoUrl = getFaviconUrl(tool.link);
        const useCases = normalizeStringArray(tool.uses, DEFAULT_USE_CASES);
        const warnings = normalizeStringArray(tool.warnings, DEFAULT_WARNINGS);
        const useCasesHtml = renderBackList(useCases, 'fa-solid fa-check');
        const warningsHtml = renderBackList(warnings, 'fa-solid fa-triangle-exclamation');
        const entryPrice = getEntryPriceLabel(tool);
        const topAssistantBadge = isAllDefault && TOP_AI_ASSISTANT_SET.has(tool.name)
          ? '<div class="top-ai-pill"><i class="fa-solid fa-star"></i>Top AI Assistant</div>'
          : '';

        card.innerHTML = `
            <div class="tool-card-inner">
                <div class="tool-card-face tool-card-front">
                    <div class="card-header">
                        <div class="tool-icon">
                            <img src="${logoUrl}" alt="${escapeHtml(tool.name)} Logo" loading="eager" onload="this.style.display='block'; this.nextElementSibling.style.display='none'" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                            <i class="${tool.icon}" style="display: block;"></i>
                        </div>
                        <span class="pricing-badge ${priceClass}">${tool.pricing}</span>
                    </div>
                    <div class="tool-category"><i class="fa-solid fa-tag"></i> ${escapeHtml(tool.category)}</div>
                    ${topAssistantBadge}
                    <div class="tool-name">${escapeHtml(tool.name)}</div>
                    <div class="tool-desc">${truncate(tool.description, GRID_DESC_MAX_LENGTH)}</div>
                    <div class="card-footer">
                        <button type="button" class="view-btn" data-action="flip">View Details <i class="fa-solid fa-arrow-right"></i></button>
                    </div>
                </div>
                <div class="tool-card-face tool-card-back">
                    <div class="tool-back-top">
                        <div class="tool-back-title">${escapeHtml(tool.name)}</div>
                        <span class="pricing-badge ${priceClass}">${tool.pricing}</span>
                    </div>
                    <div class="tool-back-meta"><i class="fa-solid fa-tag"></i> ${escapeHtml(tool.category)}</div>
                    <div class="tool-back-entry-price"><i class="fa-solid fa-money-bill-wave"></i> ${escapeHtml(entryPrice)}</div>
                    <p class="tool-back-desc">${escapeHtml(tool.description)}</p>

                    <div class="tool-back-grid">
                        <section class="tool-back-panel">
                            <h4>Top Agent Use Cases</h4>
                            <ul class="tool-back-list">${useCasesHtml}</ul>
                        </section>
                        <section class="tool-back-panel">
                            <h4>Quick Demo Idea</h4>
                            <p class="tool-back-note">${escapeHtml(tool.demo || DEFAULT_DEMO)}</p>
                        </section>
                        <section class="tool-back-panel">
                            <h4>Watch Out For</h4>
                            <ul class="tool-back-list">${warningsHtml}</ul>
                        </section>
                    </div>

                    <p class="tool-back-note">${escapeHtml(tool.pairs || DEFAULT_PAIRS)}</p>

                    <div class="tool-back-actions">
                        <a href="${escapeHtml(tool.link)}" target="_blank" rel="noopener noreferrer" class="tool-launch" data-no-flip="true">Launch Tool <i class="fa-solid fa-arrow-up-right-from-square"></i></a>
                        <button type="button" class="back-btn" data-action="unflip"><i class="fa-solid fa-rotate-left"></i>Back</button>
                    </div>
                </div>
            </div>
        `;

        const flipBtn = card.querySelector('[data-action="flip"]');
        const unflipBtn = card.querySelector('[data-action="unflip"]');
        const launchBtn = card.querySelector('[data-no-flip="true"]');

        card.addEventListener('click', (event) => {
          if (event.target.closest('button, a, input, textarea, select, label')) return;
          openFocusedCard(card);
        });

        card.addEventListener('keydown', (event) => {
          if (event.key !== 'Enter' && event.key !== ' ') return;
          event.preventDefault();
          openFocusedCard(card);
        });

        if (flipBtn) {
          flipBtn.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            openFocusedCard(card);
          });
        }

        if (unflipBtn) {
          unflipBtn.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            closeFocusedCard(true);
          });
        }

        if (launchBtn) {
          launchBtn.addEventListener('click', (event) => {
            event.stopPropagation();
          });
        }

        grid.appendChild(card);
      });

      observeVisibleTiles(grid);
      scheduleTileBacklight();
    }

    function truncate(str, n) {
      return (str.length > n) ? str.slice(0, n - 1) + '&hellip;' : str;
    }

    function openModal(tool, sourceEl) {
      const accent = getToolAccent(tool);
      const accentRgb = hexToRgb(accent);

      if (selectedToolEl) selectedToolEl.classList.remove('is-selected');
      selectedToolEl = sourceEl || null;
      if (selectedToolEl) selectedToolEl.classList.add('is-selected');

      mContent.style.setProperty('--modal-accent', accent);
      mContent.style.setProperty('--modal-accent-rgb', accentRgb);

      mName.innerText = tool.name;
      mCat.innerText = tool.category;
      mPrice.innerText = tool.pricing;
      mDesc.innerText = tool.description;
      mLink.href = tool.link;
      const entryPrice = getEntryPriceLabel(tool);
      mEntryPrice.innerHTML = `<i class="fa-solid fa-money-bill-wave" aria-hidden="true"></i><span>${escapeHtml(entryPrice)}</span>`;

      // Extended fields
      mUses.innerHTML = '';
      normalizeStringArray(tool.uses, DEFAULT_USE_CASES).forEach(use => {
        const li = document.createElement('li');
        li.style.marginBottom = '6px';
        li.innerHTML = `<i class="fa-solid fa-check" style="color:var(--modal-accent); margin-right:8px; font-size:0.8rem;"></i> ${escapeHtml(use)}`;
        mUses.appendChild(li);
      });

      mDemo.innerText = tool.demo || DEFAULT_DEMO;

      mWarnings.innerHTML = '';
      normalizeStringArray(tool.warnings, DEFAULT_WARNINGS).forEach(warning => {
        const li = document.createElement('li');
        li.style.marginBottom = '4px';
        li.innerText = warning;
        mWarnings.appendChild(li);
      });

      mPairs.innerText = tool.pairs || DEFAULT_PAIRS;

      // Handle logo logic for modal
      const logoUrl = getFaviconUrl(tool.link);

      mImg.src = logoUrl;
      mImg.style.display = 'none'; // reset
      mIconI.className = tool.icon;
      mIconI.style.display = 'block'; // reset

      // We need to rely on the load event again or just try to load
      const tempImg = new Image();
      tempImg.src = logoUrl;
      tempImg.onload = function () {
        mImg.style.display = 'block';
        mIconI.style.display = 'none';
      }
      tempImg.onerror = function () {
        mImg.style.display = 'none';
        mIconI.style.display = 'block';
      }

      modal.classList.add('open');
    }

    function closeModal() {
      modal.classList.remove('open');
      if (selectedToolEl) {
        selectedToolEl.classList.remove('is-selected');
        selectedToolEl = null;
      }
    }

    // ── Business Flow Data ── //
    const businessFlow = [
      {
        stage: "1. Prospecting & Farming",
        desc: "Finding sellers and generating new leads before they hit the market.",
        tools: ["Likely.AI", "Addressable", "Ylopo", "Copy.ai", "Perplexity", "CallRail", "ManyChat"]
      },
      {
        stage: "2. Listing & Marketing",
        desc: "Winning the listing and showcasing the property with world-class visuals.",
        tools: ["HighNote", "CubiCasa", "Matterport", "Writor", "Virtual Staging AI", "Photoroom", "Collov AI", "Epique AI", "Midjourney", "Canva"]
      },
      {
        stage: "3. Content & Brand",
        desc: "Social media presence and video content to stay top-of-mind.",
        tools: ["Opus Clip", "Descript", "HeyGen", "Captions.ai", "Luma Dream Machine", "Runway", "Loom", "CapCut", "Riverside", "Chatbase", "SIG Generator"]
      },
      {
        stage: "4. Lead Nurture & Sales",
        desc: "Managing relationships and converting conversations into appointments.",
        tools: ["Follow Up Boss", "Lofty", "ChatGPT", "Claude", "Calendly"]
      },
      {
        stage: "5. Transaction & Operations",
        desc: "Streamlining the contract-to-close process and business tracking.",
        tools: ["Sisu", "Fathom", "Otter.ai", "Fireflies.ai", "Restb.ai", "Zapier", "Make", "Notion", "Google Gemini", "HouseCanary", "Scribe", "NotebookLM", "Relevance AI"]
      }
    ];

    // ── Logic ── //
    const flowView = document.getElementById('flow-view');
    const filtersContainer = document.getElementById('category-filters');
    const mainTitle = document.getElementById('main-title');

    // Toggle Elements
    const btnGrid = document.getElementById('btn-grid');
    const btnFlow = document.getElementById('btn-flow');
    const toggleBg = document.getElementById('toggle-bg');
    const toggleWrapper = document.querySelector('.toggle-wrapper');

    function switchView(view) {
      if (focusedCardEl) {
        closeFocusedCard(false);
      }

      if (toggleWrapper) {
        toggleWrapper.dataset.view = view;
      }
      if (view === 'grid') {
        grid.style.display = 'grid';
        flowView.style.display = 'none';
        filtersContainer.style.display = '';
        mainTitle.innerHTML = 'Verified Tools Database <span style="font-size:0.8em; opacity:0.5; margin-left:10px;" id="count-display"></span>';

        btnGrid.classList.add('active');
        btnFlow.classList.remove('active');
        btnGrid.setAttribute('aria-pressed', 'true');
        btnFlow.setAttribute('aria-pressed', 'false');
        if (toggleBg) {
          toggleBg.style.transform = 'translateX(0)';
        }
        filtersContainer.scrollLeft = 0;

        renderTools(); // refresh count
      } else {
        grid.style.display = 'none';
        flowView.style.display = 'block';
        filtersContainer.style.display = 'none';
        mainTitle.innerHTML = 'Business Operation Flow';

        btnGrid.classList.remove('active');
        btnFlow.classList.add('active');
        btnGrid.setAttribute('aria-pressed', 'false');
        btnFlow.setAttribute('aria-pressed', 'true');
        if (toggleBg) {
          toggleBg.style.transform = 'translateX(100%)';
        }

        renderFlow();
      }

      if (!reduceMotion) {
        scheduleHeroParallax();
      }
    }

    function renderFlow() {
      if (tileObserver) {
        tileObserver.disconnect();
        inViewTiles.clear();
      }

      flowView.innerHTML = '<div class="flow-line"></div>'; // reset but keep line

      businessFlow.forEach(step => {
        const stageDiv = document.createElement('div');
        stageDiv.className = 'business-stage';

        // Generate tool cards HTML
        let toolsHtml = '';
        step.tools.forEach(toolName => {
          const tool = TOOL_BY_NAME.get(toolName);
          if (tool) {
            const logoUrl = getFaviconUrl(tool.link);
            const accent = getToolAccent(tool);
            const accentRgb = hexToRgb(accent);
            const escapedToolName = tool.name.replace(/'/g, "\\'");

            // JSON stringify logic to pass object to onclick
            // For simplicity in this vanilla JS, we'll look up by name in openModal
            toolsHtml += `
                        <div class="mini-tool-card" style="--tool-accent:${accent}; --tool-accent-rgb:${accentRgb};" onclick="findAndOpenModal('${escapedToolName}', this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();findAndOpenModal('${escapedToolName}', this)}" tabindex="0" role="button" aria-label="Open ${escapeHtml(tool.name)} details">
                            <div class="mini-icon">
                                <img src="${logoUrl}" alt="${tool.name}" loading="lazy">
                            </div>
                            <span class="mini-name">${tool.name}</span>
                        </div>
                    `;
          }
        });

        stageDiv.innerHTML = `
                <div class="stage-header">
                    <div class="stage-title">${step.stage}</div>
                    <span class="stage-desc">${step.desc}</span>
                </div>
                <div class="stage-tools">
                    ${toolsHtml}
                </div>
            `;

        flowView.appendChild(stageDiv);
      });

      observeVisibleTiles(flowView);
      scheduleTileBacklight();
    }

    function findAndOpenModal(name, sourceEl) {
      const tool = TOOL_BY_NAME.get(name);
      if (tool) openModal(tool, sourceEl || null);
    }


    // Initialize
    init();
  </script>
