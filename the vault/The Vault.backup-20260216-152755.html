<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keeping AI on Things — The Vault</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      /* Palette based on 'Keeping AI on Things' aesthetic + Premium Dark Mode */
      --bg-deep: #050a14;
      --bg-card: #0f1c2e;
      --bg-card-hover: #16263d;
      --accent-cyan: #00e5ff;
      --accent-cyan-dim: rgba(0, 229, 255, 0.15);
      --accent-purple: #9d4edd;
      --accent-gold: #d4a04a;
      --text-main: #ffffff;
      --text-muted: #94a3b8;
      --border-subtle: rgba(255, 255, 255, 0.08);
      --glow: 0 0 20px rgba(0, 229, 255, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-deep);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-deep);
    }

    ::-webkit-scrollbar-thumb {
      background: #2a3b55;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-cyan);
    }

    /* ── Header / Hero ── */
    header {
      position: relative;
      height: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      background: linear-gradient(to bottom, rgba(5, 10, 20, 0.3), var(--bg-deep)), url('tech_hero.png') no-repeat center center;
      background-size: cover;
      border-bottom: 1px solid var(--border-subtle);
    }

    /* Overlay for readability */
    header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(5, 10, 20, 0.4) 0%, var(--bg-deep) 100%);
      z-index: 1;
    }

    .header-content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 800px;
      animation: fadeInDown 0.8s ease-out;
    }

    .brand-eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 0.85rem;
      color: var(--accent-cyan);
      margin-bottom: 12px;
      display: inline-block;
      background: var(--accent-cyan-dim);
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid rgba(0, 229, 255, 0.3);
      backdrop-filter: blur(5px);
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 5rem;
      line-height: 0.9;
      margin-bottom: 24px;
      background: linear-gradient(180deg, #fff 0%, #e0e0e0 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
    }

    .search-container {
      position: relative;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }

    #search-input {
      width: 100%;
      padding: 18px 24px 18px 55px;
      font-size: 1.1rem;
      background: rgba(15, 28, 46, 0.8);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      color: white;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    #search-input:focus {
      outline: none;
      border-color: var(--accent-cyan);
      box-shadow: 0 0 20px var(--accent-cyan-dim);
      background: rgba(15, 28, 46, 0.95);
    }

    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.2rem;
      pointer-events: none;
    }

    /* ── Filters ── */
    .filters-container {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(5, 10, 20, 0.9);
      backdrop-filter: blur(10px);
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: center;
      gap: 12px;
      overflow-x: auto;
      white-space: nowrap;
    }

    /* Hide scrollbar on filters for clean look */
    .filters-container::-webkit-scrollbar {
      height: 0px;
      background: transparent;
    }

    .filter-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .filter-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }

    .filter-btn.active {
      background: var(--accent-cyan-dim);
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
    }

    /* ── Main Layout ── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-main);
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border-subtle), transparent);
    }

    /* ── Grid ── */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
      margin-bottom: 60px;
    }

    /* ── Card Design ── */
    .tool-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }

    .tool-card:hover {
      transform: translateY(-5px);
      border-color: rgba(0, 229, 255, 0.3);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
      background: var(--bg-card-hover);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .tool-icon {
      width: 56px;
      height: 56px;
      background: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #1a2a45;
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      position: relative;
      padding: 6px;
    }

    .tool-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    /* .tool-icon i style removed */

    .pricing-badge {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pricing-free {
      background: rgba(76, 175, 80, 0.15);
      color: #66bb6a;
      border: 1px solid rgba(76, 175, 80, 0.3);
    }

    .pricing-paid {
      background: rgba(255, 82, 82, 0.15);
      color: #ff5252;
      border: 1px solid rgba(255, 82, 82, 0.3);
    }

    .pricing-freemium {
      background: rgba(255, 179, 0, 0.15);
      color: #ffb300;
      border: 1px solid rgba(255, 179, 0, 0.3);
    }

    .tool-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: white;
    }

    .tool-category {
      font-size: 0.85rem;
      color: var(--accent-cyan);
      margin-bottom: 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .tool-desc {
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text-muted);
      margin-bottom: 20px;
      flex-grow: 1;
      /* Pushes footer down */
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .view-btn {
      background: transparent;
      color: white;
      border: 1px solid var(--border-subtle);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .view-btn:hover {
      background: white;
      color: black;
      border-color: white;
    }

    /* ── Hover Glow Effect ── */
    .tool-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, transparent 40%, rgba(0, 229, 255, 0.03) 100%);
      pointer-events: none;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 10, 20, 0.9);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      background: #132238;
      border: 1px solid var(--accent-cyan-dim);
      width: 100%;
      max-width: 700px;
      border-radius: 20px;
      padding: 40px;
      position: relative;
      transform: translateY(20px);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    }

    .modal-overlay.open .modal-content {
      transform: translateY(0);
    }

    .close-modal {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .close-modal:hover {
      color: white;
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .modal-icon {
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #1a2a45;
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
      overflow: hidden;
      position: relative;
      padding: 10px;
    }

    .modal-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    .modal-title h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      color: white;
      margin-bottom: 4px;
    }

    .modal-meta {
      display: flex;
      gap: 12px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .modal-body {
      line-height: 1.6;
      color: #d1d5db;
      font-size: 1.05rem;
    }

    .modal-actions {
      margin-top: 30px;
      display: flex;
      gap: 16px;
    }

    .cta-btn {
      background: var(--accent-cyan);
      color: #050a14;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 229, 255, 0.3);
    }

    /* ── Animations ── */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .tool-card {
      animation: fadeIn 0.5s ease-out forwards;
    }

    /* ── View Toggle Switch ── */
    .view-toggle-container {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .toggle-wrapper {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      padding: 4px;
      display: flex;
      position: relative;
      border: 1px solid var(--border-subtle);
    }

    .toggle-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 8px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      position: relative;
      z-index: 2;
      transition: color 0.3s;
    }

    .toggle-btn.active {
      color: #050a14;
      font-weight: 600;
    }

    .toggle-bg {
      position: absolute;
      top: 4px;
      left: 4px;
      height: calc(100% - 8px);
      width: 50%;
      background: var(--accent-cyan);
      border-radius: 25px;
      transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
      z-index: 1;
      box-shadow: 0 0 15px var(--accent-cyan-dim);
    }

    /* ── Flow / Tree View ── */
    .flow-container {
      display: none;
      /* Hidden by default */
      position: relative;
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 0;
    }

    .flow-line {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, var(--accent-cyan) 0%, rgba(0, 229, 255, 0.2) 100%);
      transform: translateX(-50%);
      z-index: 0;
    }

    .business-stage {
      position: relative;
      margin-bottom: 60px;
      z-index: 1;
    }

    .stage-header {
      background: var(--bg-deep);
      border: 1px solid var(--accent-cyan);
      padding: 12px 24px;
      border-radius: 30px;
      display: inline-block;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 30px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .stage-title {
      color: var(--accent-cyan);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 1rem;
      text-align: center;
    }

    .stage-desc {
      color: var(--text-muted);
      font-size: 0.8rem;
      display: block;
      text-align: center;
      margin-top: 4px;
    }

    .stage-tools {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      padding: 0 20px;
    }

    /* Mini-Card for Flow View */
    .mini-tool-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 200px;
      /* Fixed width */
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .mini-tool-card:hover {
      border-color: var(--accent-cyan);
      transform: translateY(-3px);
      background: var(--bg-card-hover);
    }

    /* Connector line from center to card - simplified */
    .mini-tool-card::before {
      content: '';
      position: absolute;
      top: 50%;
      width: 20px;
      height: 1px;
      background: var(--border-subtle);
      z-index: -1;
    }

    /* We won't do complex connector lines for now to keep CSS clean, 
       just the vertical flow line is enough visual structure. */

    .mini-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px;
    }

    .mini-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .mini-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: white;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      h1 {
        font-size: 3.5rem;
      }

      .tools-grid {
        grid-template-columns: 1fr;
      }

      header {
        height: 320px;
      }

      .filters-container {
        padding: 12px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-content">
      <span class="brand-eyebrow">Keeping AI on Things</span>
      <h1>The Vault</h1>
      <div class="search-container">
        <i class="fa-solid fa-search search-icon"></i>
        <input type="text" id="search-input" placeholder="Find tools for CRM, Video, Design...">
      </div>

      <div class="view-toggle-container">
        <div class="toggle-wrapper">
          <div class="toggle-bg" id="toggle-bg"></div>
          <button class="toggle-btn active" id="btn-grid" onclick="switchView('grid')">Grid View</button>
          <button class="toggle-btn" id="btn-flow" onclick="switchView('flow')">Business Line</button>
        </div>
      </div>
    </div>
  </header>

  <div class="filters-container" id="category-filters">
    <button class="filter-btn active" data-category="all">All Tools</button>
    <button class="filter-btn" data-category="AI Assistants">AI Assistants</button>
    <button class="filter-btn" data-category="Marketing & Content">Marketing & Content</button>
    <button class="filter-btn" data-category="Visuals & Staging">Visuals & Staging</button>
    <button class="filter-btn" data-category="Video & Social">Video & Social</button>
    <button class="filter-btn" data-category="CRM & Lead Gen">CRM & Lead Gen</button>
    <button class="filter-btn" data-category="Voice & Meetings">Voice & Meetings</button>
    <button class="filter-btn" data-category="Data & Ops">Data & Ops</button>
  </div>

  <main>
    <div class="section-title" id="main-title">Verified Tools Database <span
        style="font-size:0.8em; opacity:0.5; margin-left:10px;" id="count-display">(loading...)</span></div>

    <!-- Grid View -->
    <div class="tools-grid" id="tools-grid"></div>

    <!-- Flow View -->
    <div class="flow-container" id="flow-view">
      <div class="flow-line"></div>
      <!-- Stages injected by JS -->
    </div>
  </main>

  <!-- Modal Template -->
  <div class="modal-overlay" id="modal">
    <div class="modal-content">
      <button class="close-modal" onclick="closeModal()">&times;</button>
      <div class="modal-header">
        <div class="modal-icon" id="modal-icon">
          <img src="" alt="" id="modal-img">
          <i class="fa-solid fa-robot" id="modal-icon-i"></i>
        </div>
        <div class="modal-title">
          <h2 id="modal-name">Tool Name</h2>
          <div class="modal-meta">
            <span id="modal-category">Category</span> • <span id="modal-pricing">Pricing</span>
          </div>
        </div>
      </div>
      <div class="modal-body">
        <p id="modal-desc" style="font-size: 1.1rem; color: #fff; margin-bottom: 24px;"></p>

        <div class="modal-section">
          <h3
            style="color:var(--accent-cyan); font-size:0.9rem; text-transform:uppercase; margin-bottom:12px; letter-spacing:1px;">
            Top Agent Use Cases</h3>
          <ul id="modal-uses" style="list-style:none; padding-left:0; margin-bottom:24px; color:#cbd5e1;"></ul>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:24px; margin-bottom:24px;">
          <div
            style="background:rgba(255,255,255,0.03); padding:16px; border-radius:12px; border:1px solid var(--border-subtle);">
            <h4 style="color:var(--accent-gold); font-size:0.85rem; text-transform:uppercase; margin-bottom:8px;">Quick
              Demo Idea</h4>
            <p id="modal-demo" style="font-size:0.9rem; color:#cbd5e1;"></p>
          </div>
          <div
            style="background:rgba(255,82,82,0.1); padding:16px; border-radius:12px; border:1px solid rgba(255,82,82,0.2);">
            <h4 style="color:#ff5252; font-size:0.85rem; text-transform:uppercase; margin-bottom:8px;">Watch Out For
            </h4>
            <ul id="modal-warnings" style="padding-left:14px; margin:0; font-size:0.9rem; color:#ffcfcf;"></ul>
          </div>
        </div>

        <div class="modal-actions">
          <a href="#" target="_blank" class="cta-btn" id="modal-link">
            Launch Tool <i class="fa-solid fa-external-link-alt"></i>
          </a>
          <span style="font-size:0.85rem; color:var(--text-muted); align-self:center;" id="modal-pairs"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Extended Data Repository ── //
    const tools = [
      // ── AI Assistants ──
      {
        name: "ChatGPT",
        category: "AI Assistants",
        description: "General-purpose AI assistant for writing, planning, analysis, and workflow drafting.",
        pricing: "Freemium",
        icon: "fa-solid fa-robot",
        link: "https://chat.openai.com",
        tags: ["writing", "analysis", "coding", "general"],
        uses: [
          "Turn property notes into MLS description, social captions, and emails.",
          "Write scripts for: new leads, price drops, and appraisal drama.",
          "Create a 30-day content calendar from your niche.",

    // ── Logic ── //
    const grid = document.getElementById('tools-grid');
    const searchInput = document.getElementById('search-input');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const countDisplay = document.getElementById('count-display');

    // Modal Elements
    const modal = document.getElementById('modal');
    const mName = document.getElementById('modal-name');
    const mCat = document.getElementById('modal-category');
    const mPrice = document.getElementById('modal-pricing');
    const mDesc = document.getElementById('modal-desc');
    const mLink = document.getElementById('modal-link');
    const mIcon = document.getElementById('modal-icon');
    const mImg = document.getElementById('modal-img');
    const mIconI = document.getElementById('modal-icon-i');

    let activeCategory = 'all';
    let searchQuery = '';

    function init() {
      renderTools();
      setupeventListeners();
    }

    function setupeventListeners() {
      // Search
      searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase();
        renderTools();
      });

      // Filters
      filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          // Update Active State
          filterBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          // Set Logic
          activeCategory = btn.getAttribute('data-category');
          renderTools();
        });
      });

      // Close Modal on Overlay Click
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
      });

      // Close with Escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
      });
    }

    // Helper to extract domain for Clearbit Logo API
    function getDomain(url) {
      try {
        const hostname = new URL(url).hostname;
        return hostname.replace('www.', ''); // clean up for better API hits
      } catch (e) {
        return '';
      }
    }

    function renderTools() {
      grid.innerHTML = '';

      const filtered = tools.filter(tool => {
        const matchesSearch = tool.name.toLowerCase().includes(searchQuery) ||
          tool.description.toLowerCase().includes(searchQuery) ||
          tool.tags.some(tag => tag.includes(searchQuery));
        const matchesCategory = activeCategory === 'all' || tool.category === activeCategory;

        return matchesSearch && matchesCategory;
      });

      countDisplay.innerText = `(${filtered.length} items)`;

      if (filtered.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted); font-size: 1.1rem;">No tools found matching your criteria.</div>`;
        return;
      }

      filtered.forEach(tool => {
        const card = document.createElement('div');
        card.className = 'tool-card';
        card.onclick = () => openModal(tool);

        let priceClass = 'pricing-freemium';
        if (tool.pricing === 'Free') priceClass = 'pricing-free';
        if (tool.pricing === 'Paid') priceClass = 'pricing-paid';

        // Use Google Favicon Service
        const logoUrl = `https://t2.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=${encodeURIComponent(tool.link)}&size=128`;

        card.innerHTML = `
            <div class="card-header">
                <div class="tool-icon">
                    <img src="${logoUrl}" alt="${tool.name} Logo" loading="lazy" onload="this.style.display='block'; this.nextElementSibling.style.display='none'" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                    <i class="${tool.icon}" style="display: block;"></i>
                </div>
                <span class="pricing-badge ${priceClass}">${tool.pricing}</span>
            </div>
            <div class="tool-category"><i class="fa-solid fa-tag"></i> ${tool.category}</div>
            <div class="tool-name">${tool.name}</div>
            <div class="tool-desc">${truncate(tool.description, 90)}</div>
            <div class="card-footer">
                <span class="view-btn">View Details <i class="fa-solid fa-arrow-right"></i></span>
            </div>
        `;
        grid.appendChild(card);
      });
    }

    function truncate(str, n) {
      return (str.length > n) ? str.substr(0, n - 1) + '&hellip;' : str;
    }

    function openModal(tool) {
      mName.innerText = tool.name;
      mCat.innerText = tool.category;
      mPrice.innerText = tool.pricing;
      mDesc.innerText = tool.description;
      mLink.href = tool.link;

      // Extended fields
      const usesList = document.getElementById('modal-uses');
      usesList.innerHTML = '';
      if (tool.uses) {
        tool.uses.forEach(use => {
          const li = document.createElement('li');
          li.style.marginBottom = '6px';
          li.innerHTML = `<i class="fa-solid fa-check" style="color:var(--accent-cyan); margin-right:8px; font-size:0.8rem;"></i> ${use}`;
          usesList.appendChild(li);
        });
      } else {
        usesList.innerText = 'No specific use cases listed yet.';
      }

      document.getElementById('modal-demo').innerText = tool.demo || 'No demo available.';

      const warnList = document.getElementById('modal-warnings');
      warnList.innerHTML = '';
      if (tool.warnings) {
        tool.warnings.forEach(w => {
          const li = document.createElement('li');
          li.style.marginBottom = '4px';
          li.innerText = w;
          warnList.appendChild(li);
        });
      } else {
        warnList.innerHTML = '<li>None listed.</li>';
      }

      document.getElementById('modal-pairs').innerText = tool.pairs || '';

      // Handle logo logic for modal
      const logoUrl = `https://t2.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=${encodeURIComponent(tool.link)}&size=128`;

      mImg.src = logoUrl;
      mImg.style.display = 'none'; // reset
      mIconI.className = tool.icon;
      mIconI.style.display = 'block'; // reset

      // We need to rely on the load event again or just try to load
      const tempImg = new Image();
      tempImg.src = logoUrl;
      tempImg.onload = function () {
        mImg.style.display = 'block';
        mIconI.style.display = 'none';
      }
      tempImg.onerror = function () {
        mImg.style.display = 'none';
        mIconI.style.display = 'block';
      }

      modal.classList.add('open');
    }

    function closeModal() {
      modal.classList.remove('open');
    }

    // ── Business Flow Data ── //
    const businessFlow = [
      {
        stage: "1. Prospecting & Farming",
        desc: "Finding sellers and generating new leads before they hit the market.",
        tools: ["Likely.AI", "Addressable", "Ylopo", "Copy.ai", "Perplexity", "CallRail", "ManyChat"]
      },
      {
        stage: "2. Listing & Marketing",
        desc: "Winning the listing and showcasing the property with world-class visuals.",
        tools: ["HighNote", "CubiCasa", "Matterport", "Writor", "Virtual Staging AI", "Photoroom", "Collov AI", "Epique AI", "Midjourney", "Canva"]
      },
      {
        stage: "3. Content & Brand",
        desc: "Social media presence and video content to stay top-of-mind.",
        tools: ["Opus Clip", "Descript", "HeyGen", "Captions.ai", "Luma Dream Machine", "Runway", "Loom", "CapCut", "Riverside", "Chatbase"]
      },
      {
        stage: "4. Lead Nurture & Sales",
        desc: "Managing relationships and converting conversations into appointments.",
        tools: ["Follow Up Boss", "Lofty", "ChatGPT", "Claude", "Calendly"]
      },
      {
        stage: "5. Transaction & Operations",
        desc: "Streamlining the contract-to-close process and business tracking.",
        tools: ["Sisu", "Fathom", "Otter.ai", "Fireflies.ai", "Restb.ai", "Zapier", "Make", "Notion", "Google Gemini", "HouseCanary", "Scribe", "NotebookLM", "Relevance AI"]
      }
    ];

    // ── Logic ── //
    const flowView = document.getElementById('flow-view');
    const filtersContainer = document.getElementById('category-filters');
    const mainTitle = document.getElementById('main-title');

    // Toggle Elements
    const btnGrid = document.getElementById('btn-grid');
    const btnFlow = document.getElementById('btn-flow');
    const toggleBg = document.getElementById('toggle-bg');

    function switchView(view) {
      if (view === 'grid') {
        grid.style.display = 'grid';
        flowView.style.display = 'none';
        filtersContainer.style.display = 'flex';
        mainTitle.innerHTML = 'Verified Tools Database <span style="font-size:0.8em; opacity:0.5; margin-left:10px;" id="count-display"></span>';

        btnGrid.classList.add('active');
        btnFlow.classList.remove('active');
        toggleBg.style.transform = 'translateX(0)';

        renderTools(); // refresh count
      } else {
        grid.style.display = 'none';
        flowView.style.display = 'block';
        filtersContainer.style.display = 'none';
        mainTitle.innerHTML = 'Business Operation Flow';

        btnGrid.classList.remove('active');
        btnFlow.classList.add('active');
        toggleBg.style.transform = 'translateX(100%)';

        renderFlow();
      }
    }

    function renderFlow() {
      flowView.innerHTML = '<div class="flow-line"></div>'; // reset but keep line

      businessFlow.forEach(step => {
        const stageDiv = document.createElement('div');
        stageDiv.className = 'business-stage';

        // Generate tool cards HTML
        let toolsHtml = '';
        step.tools.forEach(toolName => {
          const tool = tools.find(t => t.name === toolName);
          if (tool) {
            const logoUrl = `https://t2.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=${encodeURIComponent(tool.link)}&size=128`;

            // JSON stringify logic to pass object to onclick
            // For simplicity in this vanilla JS, we'll look up by name in openModal
            toolsHtml += `
                        <div class="mini-tool-card" onclick="findAndOpenModal('${tool.name}')">
                            <div class="mini-icon">
                                <img src="${logoUrl}" alt="${tool.name}" loading="lazy">
                            </div>
                            <span class="mini-name">${tool.name}</span>
                        </div>
                    `;
          }
        });

        stageDiv.innerHTML = `
                <div class="stage-header">
                    <div class="stage-title">${step.stage}</div>
                    <span class="stage-desc">${step.desc}</span>
                </div>
                <div class="stage-tools">
                    ${toolsHtml}
                </div>
            `;

        flowView.appendChild(stageDiv);
      });
    }

    function findAndOpenModal(name) {
      const tool = tools.find(t => t.name === name);
      if (tool) openModal(tool);
    }


    // Initialize
    init();
  </script>
